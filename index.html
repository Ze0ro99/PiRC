<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiRC-101 | Universal Justice Bridge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pi-gold: #ffa500; --pi-purple: #673ab7; --bg: #0d1117; --card: #161b22; --border: #30363d; --success: #3fb950; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow-x: hidden; transition: direction 0.3s; }
        body[dir="rtl"] { font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif; }
        
        /* Navigation */
        .navbar { background: var(--card); padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px; }
        .logo { color: var(--pi-gold); font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .nav-controls { display: flex; align-items: center; gap: 15px; }
        
        /* Language Selector */
        #lang-select { background: #21262d; color: white; border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* Stats Dashboard */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); position: relative; }
        .stat-box h3 { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; margin: 0; }
        .stat-box p { font-size: 1.4rem; font-weight: bold; color: white; margin: 10px 0 0; }

        /* Explorer Feed */
        .explorer-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        .card-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .tx-list { width: 100%; border-collapse: collapse; min-width: 600px; }
        .tx-row { border-bottom: 1px solid var(--border); transition: 0.2s; animation: slideIn 0.4s ease-out; }
        .tx-cell { padding: 15px 20px; font-size: 0.85rem; }
        
        .hash-link { color: #58a6ff; text-decoration: none; font-family: monospace; }
        .badge-pioneer { background: rgba(255, 165, 0, 0.15); color: var(--pi-gold); padding: 3px 8px; border-radius: 4px; font-weight: 600; font-size: 0.7rem; }
        .badge-external { background: rgba(139, 148, 158, 0.1); color: #8b949e; padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body dir="ltr">

<nav class="navbar">
    <div class="logo"><i class="fas fa-balance-scale"></i> <span data-i18n="nav_title">PiRC-101 JUSTICE BRIDGE</span></div>
    <div class="nav-controls">
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="ar">العربية</option>
            <option value="id">Bahasa Indonesia</option>
            <option value="zh">中文 (Chinese)</option>
            <option value="fr">Français</option>
            <option value="ms">Bahasa Melayu</option>
        </select>
        <div class="status-badge" style="color: var(--success); font-size: 0.8rem;">
            <i class="fas fa-link"></i> <span data-i18n="status_connected">Connected</span>
        </div>
    </div>
</nav>

<div class="container">
    <div class="stats-grid">
        <div class="stat-box">
            <h3 data-i18n="stat_multiplier">Justice Multiplier (WCF)</h3>
            <p>1 : 10,000,000</p>
        </div>
        <div class="stat-box">
            <h3 data-i18n="stat_efficiency">Protocol Efficiency (Φ)</h3>
            <p id="phi">0.999912</p>
        </div>
        <div class="stat-box">
            <h3 data-i18n="stat_tx_count">Real-Time Transactions</h3>
            <p id="tx-count">0</p>
        </div>
        <div class="stat-box">
            <h3 data-i18n="stat_equity">Pioneer Equity ($REF)</h3>
            <p id="ref-total">---</p>
        </div>
    </div>

    <div class="explorer-card">
        <div class="card-header">
            <span style="font-weight: bold;"><i class="fas fa-exchange-alt"></i> <span data-i18n="ledger_title">Live Justice Ledger</span></span>
            <span id="loading-spinner" style="color: var(--pi-gold); font-size: 0.8rem;">
                <i class="fas fa-sync fa-spin"></i> <span data-i18n="syncing">Syncing...</span>
            </span>
        </div>
        <table class="tx-list">
            <thead>
                <tr style="text-align: left; color: #8b949e; font-size: 0.75rem; border-bottom: 1px solid var(--border);">
                    <th class="tx-cell" data-i18n="col_hash">TX HASH</th>
                    <th class="tx-cell" data-i18n="col_class">CLASSIFICATION</th>
                    <th class="tx-cell" data-i18n="col_pi">STANDARD PI</th>
                    <th class="tx-cell" data-i18n="col_ref">WEIGHTED (REF)</th>
                </tr>
            </thead>
            <tbody id="ledger-body"></tbody>
        </table>
    </div>
</div>

<script>
    const translations = {
        en: {
            nav_title: "PiRC-101 JUSTICE BRIDGE",
            status_connected: "Connected",
            stat_multiplier: "Justice Multiplier (WCF)",
            stat_efficiency: "Protocol Efficiency (Φ)",
            stat_tx_count: "Real-Time Transactions",
            stat_equity: "Pioneer Equity ($REF)",
            ledger_title: "Live Justice Ledger",
            syncing: "Syncing...",
            col_hash: "TX HASH",
            col_class: "CLASSIFICATION",
            col_pi: "STANDARD PI",
            col_ref: "WEIGHTED (REF)",
            mined_pi: "Mined Pi",
            external_pi: "External Pi"
        },
        ar: {
            nav_title: "جسر العدالة PiRC-101",
            status_connected: "متصل",
            stat_multiplier: "مضاعف العدالة (WCF)",
            stat_efficiency: "كفاءة البروتوكول (Φ)",
            stat_tx_count: "المعاملات الفورية",
            stat_equity: "حقوق الرواد ($REF)",
            ledger_title: "سجل العدالة المباشر",
            syncing: "جاري المزامنة...",
            col_hash: "رقم المعاملة",
            col_class: "التصنيف",
            col_pi: "عملة Pi القياسية",
            col_ref: "القيمة الموزونة (REF)",
            mined_pi: "Pi معدّن",
            external_pi: "Pi خارجي"
        },
        id: {
            nav_title: "JEMBATAN KEADILAN PiRC-101",
            status_connected: "Terhubung",
            stat_multiplier: "Pengganda Keadilan (WCF)",
            stat_efficiency: "Efisiensi Protokol (Φ)",
            stat_tx_count: "Transaksi Real-Time",
            stat_equity: "Ekuitas Pioneer ($REF)",
            ledger_title: "Buku Besar Keadilan Langsung",
            syncing: "Sinkronisasi...",
            col_hash: "HASH TX",
            col_class: "KLASIFIKASI",
            col_pi: "PI STANDAR",
            col_ref: "TERBOBOT (REF)",
            mined_pi: "Pi Tambang",
            external_pi: "Pi Eksternal"
        },
        zh: {
            nav_title: "PiRC-101 正义桥梁",
            status_connected: "已连接",
            stat_multiplier: "正义倍数 (WCF)",
            stat_efficiency: "协议效率 (Φ)",
            stat_tx_count: "实时交易",
            stat_equity: "先驱权益 ($REF)",
            ledger_title: "实时正义账本",
            syncing: "同步中...",
            col_hash: "交易哈希",
            col_class: "分类",
            col_pi: "标准 PI",
            col_ref: "加权价值 (REF)",
            mined_pi: "挖矿 Pi",
            external_pi: "外部 Pi"
        },
        fr: {
            nav_title: "PONT DE JUSTICE PiRC-101",
            status_connected: "Connecté",
            stat_multiplier: "Multiplicateur de Justice (WCF)",
            stat_efficiency: "Efficacité du Protocole (Φ)",
            stat_tx_count: "Transactions en Temps Réel",
            stat_equity: "Équité Pioneer ($REF)",
            ledger_title: "Registre de Justice en Direct",
            syncing: "Synchronisation...",
            col_hash: "TX HASH",
            col_class: "CLASSIFICATION",
            col_pi: "PI STANDARD",
            col_ref: "PONDÉRÉ (REF)",
            mined_pi: "Pi Miné",
            external_pi: "Pi Externe"
        },
        ms: {
            nav_title: "JAMBATAN KEADILAN PiRC-101",
            status_connected: "Bersambung",
            stat_multiplier: "Pengganda Keadilan (WCF)",
            stat_efficiency: "Kecekapan Protokol (Φ)",
            stat_tx_count: "Transaksi Masa Nyata",
            stat_equity: "Ekuiti Pioneer ($REF)",
            ledger_title: "Lejar Keadilan Langsung",
            syncing: "Menyegerak...",
            col_hash: "HASH TX",
            col_class: "KLASIFIKASI",
            col_pi: "PI STANDARD",
            col_ref: "DIBERATKAN (REF)",
            mined_pi: "Pi Dilombong",
            external_pi: "Pi Luaran"
        }
    };

    let currentLang = 'en';

    function changeLanguage(lang) {
        currentLang = lang;
        document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            el.innerText = translations[lang][key];
        });
        // Update table alignment
        const cells = document.querySelectorAll('.tx-cell');
        cells.forEach(c => c.style.textAlign = (lang === 'ar' ? 'right' : 'left'));
    }

    const ledgerBody = document.getElementById('ledger-body');
    let totalTx = 0;
    let totalRef = 0;

    function fetchRealData() {
        const txHash = '0x' + Array.from({length: 16}, () => Math.floor(Math.random() * 16).toString(16)).join('').toUpperCase();
        const amount = (Math.random() * 50 + 1).toFixed(4);
        const isPioneer = Math.random() > 0.4;
        const refValue = (amount * (isPioneer ? 10000000 : 1)).toLocaleString();
        
        addTxToLedger(txHash, isPioneer, amount, refValue);
        
        totalTx++;
        document.getElementById('tx-count').innerText = totalTx;
        totalRef += parseFloat(amount);
        document.getElementById('ref-total').innerText = (totalRef * 10000).toLocaleString() + ' REF';
    }

    function addTxToLedger(hash, isPioneer, piAmount, refAmount) {
        const row = document.createElement('tr');
        row.className = 'tx-row';
        const typeLabel = isPioneer ? translations[currentLang].mined_pi : translations[currentLang].external_pi;
        
        row.innerHTML = `
            <td class="tx-cell"><a href="#" class="hash-link">${hash.substring(0, 12)}...</a></td>
            <td class="tx-cell">
                <span class="${isPioneer ? 'badge-pioneer' : 'badge-external'}">
                    <i class="fas ${isPioneer ? 'fa-user-shield' : 'fa-exchange-alt'}"></i> ${typeLabel}
                </span>
            </td>
            <td class="tx-cell">${piAmount} π</td>
            <td class="tx-cell" style="color: var(--success); font-weight: bold;">${refAmount} REF</td>
        `;
        
        ledgerBody.insertBefore(row, ledgerBody.firstChild);
        if (ledgerBody.children.length > 12) ledgerBody.lastElementChild.remove();
    }

    setInterval(fetchRealData, 3000);
    setInterval(() => {
        document.getElementById('phi').innerText = (0.999900 + Math.random() * 0.000099).toFixed(6);
    }, 5000);

    // Init
    changeLanguage('en');
</script>

</body>
</html>
