<!-- ========================================== -->
<!-- LIVE PIDEX BLOCKCHAIN LEDGER (Pi Testnet)  -->
<!-- ========================================== -->
<style>
  .live-ledger-wrapper {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    margin: 20px 0;
    font-family: 'Courier New', Courier, monospace;
    color: #c9d1d9;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    overflow-x: auto;
  }
  .ledger-title {
    color: #58a6ff;
    font-size: 1.2rem;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
  }
  .pulsing-dot {
    width: 12px;
    height: 12px;
    background-color: #3fb950;
    border-radius: 50%;
    box-shadow: 0 0 8px #3fb950;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(63, 185, 80, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(63, 185, 80, 0); }
  }
  .ledger-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    text-align: left;
  }
  .ledger-table th, .ledger-table td {
    padding: 10px;
    border-bottom: 1px solid #21262d;
  }
  .ledger-table th {
    color: #8b949e;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .ledger-row {
    animation: slideDown 0.5s ease-out;
    transition: background 0.2s;
  }
  .ledger-row:hover {
    background: #161b22;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); background: #238636; }
    to { opacity: 1; transform: translateY(0); background: transparent; }
  }
  .hash-link {
    color: #58a6ff;
    text-decoration: none;
    font-weight: bold;
  }
  .hash-link:hover {
    text-decoration: underline;
    color: #79c0ff;
  }
  .badge {
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    background: #1f6feb;
    color: white;
    font-weight: bold;
  }
  .badge.payment { background: #238636; }
  .badge.trade { background: #a371f7; }
  .badge.trust { background: #d29922; }
  .dex-highlight {
    border-left: 3px solid #e3b341;
    background: rgba(227, 179, 65, 0.05);
  }
</style>

<div class="live-ledger-wrapper">
  <div class="ledger-title">
    <div class="pulsing-dot"></div>
    LIVE PI TESTNET & DEX OPERATIONS
  </div>
  <table class="ledger-table">
    <thead>
      <tr>
        <th>Time</th>
        <th>Tx Hash</th>
        <th>Operation</th>
        <th>Asset / Details</th>
      </tr>
    </thead>
    <tbody id="live-ledger-body">
      <tr id="loading-row">
        <td colspan="4" style="text-align:center; padding: 20px; color: #8b949e;">
          Syncing with Pi Testnet Blockchain...
        </td>
      </tr>
    </tbody>
  </table>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const ledgerBody = document.getElementById('live-ledger-body');
    const MAX_ROWS = 8; // Number of live rows to display
    
    // Your Master Account ID (To highlight your DEX transactions)
    const MASTER_ACCOUNT = 'GA3ECRFJ'; // The script will match the prefix

    // Connect to Pi Testnet Horizon API (Real-time Stream)
    const horizonUrl = 'https://api.testnet.minepi.com/operations?cursor=now';
    const eventSource = new EventSource(horizonUrl);

    eventSource.onmessage = function(event) {
      const operation = JSON.parse(event.data);
      
      // Remove loading message
      const loadingRow = document.getElementById('loading-row');
      if(loadingRow) loadingRow.remove();

      // 1. Format Time
      const date = new Date(operation.created_at);
      const timeString = date.toLocaleTimeString('en-US', { hour12: false });

      // 2. Format Hash (Shortened for UI, full link for Explorer)
      const fullHash = operation.transaction_hash;
      const shortHash = fullHash.substring(0, 6) + '...' + fullHash.substring(fullHash.length - 6);
      const explorerLink = `https://blockexplorer.minepi.com/testnet/transactions/${fullHash}`;

      // 3. Format Operation Type
      let opType = operation.type.replace(/_/g, ' ').toUpperCase();
      let badgeClass = 'badge';
      if(opType.includes('PAYMENT')) badgeClass += ' payment';
      if(opType.includes('OFFER') || opType.includes('TRADE')) badgeClass += ' trade';
      if(opType.includes('TRUST')) badgeClass += ' trust';

      // 4. Format Details (Asset & Amount)
      let details = '<span style="color:#8b949e">Network Operation</span>';
      if (operation.asset_code) {
        details = `<strong style="color:#e3b341">${operation.amount || ''} ${operation.asset_code}</strong>`;
      } else if (operation.starting_balance) {
        details = `Account Funded: ${operation.starting_balance} Test-Pi`;
      } else if (operation.type_i === 1 && !operation.asset_code) {
        details = `<strong style="color:#3fb950">${operation.amount} Test-Pi</strong>`;
      }

      // 5. Highlight DEX Operations (If it involves your Master Account or Tokens)
      const isDexOp = (operation.source_account && operation.source_account.includes(MASTER_ACCOUNT)) || 
                      (operation.to && operation.to.includes(MASTER_ACCOUNT));
      
      const rowClass = isDexOp ? 'ledger-row dex-highlight' : 'ledger-row';
      const dexBadge = isDexOp ? ' <span style="font-size:0.7rem; background:#e3b341; color:#000; padding:2px 4px; border-radius:4px; margin-left:5px;">⭐ PiDEX</span>' : '';

      // Create new row
      const tr = document.createElement('tr');
      tr.className = rowClass;
      tr.innerHTML = `
        <td style="color:#8b949e">${timeString}</td>
        <td><a href="${explorerLink}" target="_blank" class="hash-link">${shortHash}</a></td>
        <td><span class="${badgeClass}">${opType}</span></td>
        <td>${details}${dexBadge}</td>
      `;

      // Insert at the top of the table
      ledgerBody.insertBefore(tr, ledgerBody.firstChild);

      // Keep only the latest MAX_ROWS to prevent memory issues
      if (ledgerBody.children.length > MAX_ROWS) {
        ledgerBody.removeChild(ledgerBody.lastChild);
      }
    };

    eventSource.onerror = function(error) {
      console.warn("Blockchain stream reconnecting...");
    };
  });
</script>
<!-- ========================================== -->
