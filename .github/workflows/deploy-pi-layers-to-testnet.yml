name: Deploy PiRC-207 7 Layers to Stellar Testnet

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust + Soroban CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev libudev-dev libssl-dev build-essential
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          cargo install --locked soroban-cli

      - name: Deploy all 7 PiRC-207 layers
        env:
          STELLAR_SECRET: ${{ secrets.STELLAR_TESTNET_SECRET }}
        run: |
          source "$HOME/.cargo/env"
          echo "🚀 Starting full deployment..."

          for dir in contracts/soroban/pirc-207-*-token; do
            [ -d "$dir" ] || continue
            color=$(basename "$dir" | sed 's/pirc-207-//;s/-token//')
            echo "🔨 Deploying $color layer..."
            cd "$dir"

            # This single-line command adds the profile without breaking YAML indentation
            printf "\n[profile.release]\nopt-level = \"z\"\noverflow-checks = true\ndebug = false\nstrip = \"symbols\"\ndebug-assertions = false\npanic = \"abort\"\ncodegen-units = 1\nlto = true\n" >> Cargo.toml

            echo "📦 Building..."
            soroban contract build

            echo "🚀 Deploying..."
            CONTRACT_ID=$(soroban contract deploy \
              --wasm target/wasm32-unknown-unknown/release/*.wasm \
              --source "$STELLAR_SECRET" \
              --network testnet)

            echo "✅ Deployed $color → $CONTRACT_ID"

            echo "⚙️ Initializing..."
            soroban contract invoke \
              --id "$CONTRACT_ID" \
              --source "$STELLAR_SECRET" \
              --network testnet \
              -- initialize \
              --admin "$(soroban keys address --secret-key "$STELLAR_SECRET")" || echo "Skip init"

            VALUE=$(soroban contract invoke --id "$CONTRACT_ID" --network testnet -- get_value)
            echo "📊 $color get_value() = $VALUE"

            cd - > /dev/null
          done
          echo "🎉 DEPLOYMENT COMPLETE!"
