name: Deploy PiRC-207 7 Layers to Stellar Testnet

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (Fixes 'core' crate error)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI (Official Professional Method)
        uses: stellar/setup-stellar-cli@v1
        with:
          version: latest

      - name: Cache Rust Dependencies (High Speed)
        uses: swatinem/rust-cache@v2

      - name: Deploy all 7 PiRC-207 layers
        env:
          STELLAR_SECRET: ${{ secrets.STELLAR_TESTNET_SECRET }}
        run: |
          echo "🚀 Starting professional deployment..."
          
          # Get admin address once to save time
          ADMIN_ADDR=$(stellar keys address --secret-key "$STELLAR_SECRET")

          for dir in contracts/soroban/pirc-207-*-token; do
            [ -d "$dir" ] || continue
            color=$(basename "$dir" | sed 's/pirc-207-//;s/-token//')
            
            echo "------------------------------------------------------"
            echo "🔨 Processing $color layer..."
            cd "$dir"

            # Inject optimized release profile
            printf "\n[profile.release]\nopt-level = 'z'\noverflow-checks = true\ndebug = false\nstrip = 'symbols'\ndebug-assertions = false\npanic = 'abort'\ncodegen-units = 1\nlto = true\n" >> Cargo.toml

            echo "📦 Building $color..."
            stellar contract build

            # Robustly find the compiled WASM
            WASM_PATH=$(find target/wasm32-unknown-unknown/release/ -name "*.wasm" | head -n 1)
            
            if [ -z "$WASM_PATH" ]; then
              echo "❌ Error: WASM not found for $color. Skipping..."
              cd - > /dev/null
              continue
            fi

            echo "🚀 Deploying $color to Testnet..."
            CONTRACT_ID=$(stellar contract deploy \
              --wasm "$WASM_PATH" \
              --source "$STELLAR_SECRET" \
              --network testnet)

            echo "✅ Success! ID: $CONTRACT_ID"

            echo "⚙️ Initializing..."
            stellar contract invoke \
              --id "$CONTRACT_ID" \
              --source "$STELLAR_SECRET" \
              --network testnet \
              -- initialize \
              --admin "$ADMIN_ADDR" || echo "⚠️ Already initialized or skipped."

            # Verify value
            VALUE=$(stellar contract invoke --id "$CONTRACT_ID" --network testnet -- get_value 2>/dev/null || echo "N/A")
            echo "📊 $color current value = $VALUE"

            cd - > /dev/null
          done

          echo "------------------------------------------------------"
          echo "🎉 ALL LAYERS DEPLOYED SUCCESSFULLY!"
