name: Deploy PiRC-207 7 Layers to Stellar Testnet

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust and Soroban (High Speed)
        run: |
          # 1. Install WASM target (Fixes the 'core' crate error)
          rustup target add wasm32-unknown-unknown
          
          # 2. Fast-install Soroban CLI (Download binary instead of compiling)
          echo "📥 Downloading Soroban CLI..."
          curl -L https://github.com/stellar/soroban-cli/releases/latest/download/soroban-cli-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x soroban
          sudo mv soroban /usr/local/bin/soroban
          
          # Verify install
          soroban --version

      - name: Cache Rust Dependencies
        uses: swatinem/rust-cache@v2

      - name: Deploy all 7 PiRC-207 layers
        env:
          STELLAR_SECRET: ${{ secrets.STELLAR_TESTNET_SECRET }}
        run: |
          echo "🚀 Starting high-speed deployment of 7 layers..."
          
          # Pre-calculate admin address to save time
          ADMIN_ADDR=$(soroban keys address --secret-key "$STELLAR_SECRET")

          for dir in contracts/soroban/pirc-207-*-token; do
            [ -d "$dir" ] || continue
            color=$(basename "$dir" | sed 's/pirc-207-//;s/-token//')
            
            echo "------------------------------------------------------"
            echo "🔨 Processing $color layer..."
            cd "$dir"

            # Inject optimized release profile
            printf "\n[profile.release]\nopt-level = 'z'\noverflow-checks = true\ndebug = false\nstrip = 'symbols'\ndebug-assertions = false\npanic = 'abort'\ncodegen-units = 1\nlto = true\n" >> Cargo.toml

            echo "📦 Building $color..."
            soroban contract build

            # Locate the generated WASM file robustly
            WASM_PATH=$(find target/wasm32-unknown-unknown/release/ -name "*.wasm" | head -n 1)
            
            if [ -z "$WASM_PATH" ]; then
              echo "❌ Error: WASM file not found for $color. Skipping..."
              cd - > /dev/null
              continue
            fi

            echo "🚀 Deploying $color to Testnet..."
            CONTRACT_ID=$(soroban contract deploy \
              --wasm "$WASM_PATH" \
              --source "$STELLAR_SECRET" \
              --network testnet)

            echo "✅ Success! ID: $CONTRACT_ID"

            echo "⚙️ Initializing..."
            soroban contract invoke \
              --id "$CONTRACT_ID" \
              --source "$STELLAR_SECRET" \
              --network testnet \
              -- initialize \
              --admin "$ADMIN_ADDR" || echo "⚠️ Note: Initialization skipped/already done."

            # Quick verification
            VALUE=$(soroban contract invoke --id "$CONTRACT_ID" --network testnet -- get_value 2>/dev/null || echo "Error reading value")
            echo "📊 $color get_value() = $VALUE"

            cd - > /dev/null
          done

          echo "------------------------------------------------------"
          echo "🎉 ALL LAYERS DEPLOYED SUCCESSFULLY!"
