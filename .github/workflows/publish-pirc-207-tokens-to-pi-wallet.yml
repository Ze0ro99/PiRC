name: PiRC-207 Professional Token Minting & Wallet Listing

on:
  workflow_dispatch:

jobs:
  mint-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Stellar SDK
        run: npm install @stellar/stellar-sdk

      - name: Execute Professional Setup
        env:
          ISSUER_SECRET: ${{ secrets.STELLAR_TESTNET_SECRET }}
          DISTRIBUTOR_SECRET: ${{ secrets.DISTRIBUTOR_SECRET }}
        run: |
          # Professional Minting Script
          node - << 'EOF'
          const StellarSDK = require("@stellar/stellar-sdk");
          const server = new StellarSDK.Horizon.Server("https://api.testnet.minepi.com");
          const NETWORK_PASSPHRASE = "Pi Testnet";

          const issuerKp = StellarSDK.Keypair.fromSecret(process.env.ISSUER_SECRET);
          const distKp = StellarSDK.Keypair.fromSecret(process.env.DISTRIBUTOR_SECRET);
          
          const layers = ["PURPLE", "GOLD", "YELLOW", "ORANGE", "BLUE", "GREEN", "RED"];
          const amount = "1000000.0000000"; 

          async function run() {
            try {
              console.log("🚀 Loading Accounts...");
              const issuerAcc = await server.loadAccount(issuerKp.publicKey());
              const distAcc = await server.loadAccount(distKp.publicKey());
              const fee = (await server.fetchBaseFee()).toString();

              // 1. TRUSTLINES
              console.log("🔗 Creating Trustlines...");
              let trustTx = new StellarSDK.TransactionBuilder(distAcc, {
                fee, networkPassphrase: NETWORK_PASSPHRASE,
                timebounds: await server.fetchTimebounds(100)
              });
              layers.forEach(code => {
                trustTx.addOperation(StellarSDK.Operation.changeTrust({ 
                  asset: new StellarSDK.Asset(code, issuerKp.publicKey()) 
                }));
              });
              const sTrust = trustTx.build(); sTrust.sign(distKp);
              await server.submitTransaction(sTrust);

              // 2. MINTING
              console.log("💎 Minting Tokens...");
              let mintTx = new StellarSDK.TransactionBuilder(issuerAcc, {
                fee, networkPassphrase: NETWORK_PASSPHRASE,
                timebounds: await server.fetchTimebounds(100)
              });
              layers.forEach(code => {
                mintTx.addOperation(StellarSDK.Operation.payment({
                  destination: distKp.publicKey(),
                  asset: new StellarSDK.Asset(code, issuerKp.publicKey()),
                  amount: amount
                }));
              });
              const sMint = mintTx.build(); sMint.sign(issuerKp);
              await server.submitTransaction(sMint);

              // 3. HOME DOMAIN
              console.log("🌐 Setting Home Domain...");
              const domTx = new StellarSDK.TransactionBuilder(issuerAcc, {
                fee, networkPassphrase: NETWORK_PASSPHRASE,
                timebounds: await server.fetchTimebounds(100)
              }).addOperation(StellarSDK.Operation.setOptions({
                homeDomain: "ze0ro99.github.io/PiRC"
              })).build();
              domTx.sign(issuerKp);
              await server.submitTransaction(domTx);
              
              console.log("✅ Blockchain setup complete.");
            } catch (e) {
              console.error("❌ Error:", e.response?.data?.extras?.result_codes || e.message);
              process.exit(1);
            }
          }
          run();
          EOF

      - name: Generate pi.toml and Docs
        run: |
          mkdir -p .well-known docs
          # This command creates the TOML and removes all indentation spaces
          cat << 'EOF' | sed 's/^[[:space:]]*//' > .well-known/pi.toml
