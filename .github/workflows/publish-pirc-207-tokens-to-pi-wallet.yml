name: "PiRC-207: Final Professional RWA Orchestrator"

on:
  workflow_dispatch:

jobs:
  full-deployment:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install @stellar/stellar-sdk

      - name: Execute Professional RWA Synthesis
        env:
          ISSUER_SECRET: ${{ secrets.STELLAR_TESTNET_SECRET }}
          DISTRIBUTOR_SECRET: ${{ secrets.DISTRIBUTOR_SECRET }}
        run: |
          node - << 'EOF'
          const StellarSDK = require("@stellar/stellar-sdk");
          const fs = require('fs');
          const server = new StellarSDK.Horizon.Server("https://api.testnet.minepi.com");
          const NETWORK_PASSPHRASE = "Pi Testnet";

          async function run() {
            try {
              const issuerKp = StellarSDK.Keypair.fromSecret(process.env.ISSUER_SECRET.trim());
              const distKp = StellarSDK.Keypair.fromSecret(process.env.DISTRIBUTOR_SECRET.trim());
              const issuerPK = issuerKp.publicKey();
              const distPK = distKp.publicKey();

              console.log("🚀 Starting Orchestration for: " + issuerPK);
              const issuerAcc = await server.loadAccount(issuerPK);
              const distAcc = await server.loadAccount(distPK);
              const fee = "10000"; // High fee for guaranteed success

              const layers = [
                { code: "PURPLE", name: "Purple Layer 0", contract: "CCGEMIEAZFJSBTRL5VGJJAUGPJI3B7UQ3BTAB2OQGW73JMWLS57YVVA4" },
                { code: "GOLD",   name: "Gold Layer 1",   contract: "CD3UAUN4FU3VHPMLOZWFQWJ2UBUUBBD37SZ7WBEGJQACJ7YF6QVE2SYG" },
                { code: "YELLOW", name: "Yellow Layer 2", contract: "CANLSQUPUZYKE3S2HAIGXAHMOQWE4FVX5DS7GTL42BVKSNHLFVMQSDFF" },
                { code: "ORANGE", name: "Orange Layer 3", contract: "CB7T6TDSZ5B2MQI7NI4EG6ZASYPRMJ3XVUWS6BON4Z64OBMUJ4ZD6GKF" },
                { code: "BLUE",   name: "Blue Layer 4",   contract: "CAMSQZTSCTF3MG4UEIAWKRZNSX7LLKGKXMVBEQO2ETVPGS3CINM7JBQD" },
                { code: "GREEN",  name: "Green Layer 5",  contract: "CBPG33E7RUX6MGU65IMM4HXCAGLA4OZRBOUWKQSBTIZWE2RD52VGWDT4" },
                { code: "RED",    name: "Red Layer 6",    contract: "CC6WMAHKOPWY6HW46VNKTAV4DZZLRTTNMYLDEKCAICQGMCWV5PZYNTBO" }
              ];

              // --- STEP 1: BLOCKCHAIN OPS (Trustlines + Minting + Domain) ---
              let builder = new StellarSDK.TransactionBuilder(distAcc, {
                fee, networkPassphrase: NETWORK_PASSPHRASE,
                timebounds: await server.fetchTimebounds(100)
              });
              layers.forEach(l => {
                builder.addOperation(StellarSDK.Operation.changeTrust({ 
                  asset: new StellarSDK.Asset(l.code, issuerPK) 
                }));
              });
              const sTrust = builder.build(); sTrust.sign(distKp);
              await server.submitTransaction(sTrust);
              console.log("✅ Trustlines established.");

              let mintBuilder = new StellarSDK.TransactionBuilder(issuerAcc, {
                fee, networkPassphrase: NETWORK_PASSPHRASE,
                timebounds: await server.fetchTimebounds(100)
              });
              layers.forEach(l => {
                mintBuilder.addOperation(StellarSDK.Operation.payment({
                  destination: distPK,
                  asset: new StellarSDK.Asset(l.code, issuerPK),
                  amount: "1000000.0000000"
                }));
              });
              // Add Home Domain in same tx
              mintBuilder.addOperation(StellarSDK.Operation.setOptions({
                homeDomain: "ze0ro99.github.io/PiRC"
              }));
              const sMint = mintBuilder.build(); sMint.sign(issuerKp);
              await server.submitTransaction(sMint);
              console.log("✅ Tokens Minted & Home Domain Linked.");

              // --- STEP 2: GENERATE TOML (Clean Strings - No code in file) ---
              let toml = `ACCOUNTS=["${issuerPK}"]\n\n`;
              layers.forEach(l => {
                toml += `[[CURRENCIES]]\n`;
                toml += `code="${l.code}"\n`;
                toml += `issuer="${issuerPK}"\n`;
                toml += `display_decimals=7\n`;
                toml += `name="${l.name}"\n`;
                toml += `desc="Official PiRC-207 RWA Asset | Registry: CAEUNHEUXACISTVHICFNISFRTRVSK5IALA3H5MUT7P4JKU5L3IPSKG4B"\n`;
                toml += `image="https://ze0ro99.github.io/PiRC/images/${l.code.toLowerCase()}.png"\n\n`;
              });

              if (!fs.existsSync('.well-known')) fs.mkdirSync('.well-known');
              fs.writeFileSync('.well-known/pi.toml', toml);
              console.log("✅ Clean pi.toml generated.");

            } catch (e) {
              console.error("❌ Failed: " + (e.response?.data?.extras?.result_codes || e.message));
              process.exit(1);
            }
          }
          run();
          EOF

      - name: Deploy Professional Results
        run: |
          git config user.name "PiRC-207 Automator"
          git config user.email "bot@ze0ro99.github.io"
          touch .nojekyll
          git add .
          git commit -m "Official PiRC-207 Professional Launch" || echo "No changes"
          git push
