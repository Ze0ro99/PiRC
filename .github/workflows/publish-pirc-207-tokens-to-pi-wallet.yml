name: Publish PiRC-207 Tokens to Pi Wallet + Test Pidex (Self-Healing)

on:
  workflow_dispatch:

jobs:
  publish-and-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Stellar SDK
        run: npm install @stellar/stellar-sdk

      - name: Self-Healing Structure Creation
        env:
          STELLAR_SECRET: ${{ secrets.STELLAR_TESTNET_SECRET }}
        run: |
          # 1. Get Issuer Key
          ISSUER=$(node -e '
            const { Keypair } = require("@stellar/stellar-sdk");
            try { console.log(Keypair.fromSecret(process.env.STELLAR_SECRET).publicKey()); } 
            catch (e) { process.exit(1); }
          ')
          echo "ISSUER_PUBLIC_KEY=$ISSUER" >> $GITHUB_ENV

          # 2. Create Folders
          mkdir -p .well-known images docs
          touch .nojekyll

          # 3. Create pi.toml (Formatted to remove leading spaces automatically)
          cat << EOF | sed 's/^[[:space:]]*//' > .well-known/pi.toml
          [[CURRENCIES]]
          code = "PURPLE"
          issuer = "$ISSUER"
          name = "PiRC-207 Purple Layer"
          desc = "Layer 0 of the official PiRC-207 7-Layer RWA System"
          image = "https://ze0ro99.github.io/PiRC/images/purple.png"

          [[CURRENCIES]]
          code = "GOLD"
          issuer = "$ISSUER"
          name = "PiRC-207 Gold Layer"
          desc = "Layer 1 of the official PiRC-207 7-Layer RWA System | Parity: 314159"
          image = "https://ze0ro99.github.io/PiRC/images/gold.png"

          [[CURRENCIES]]
          code = "YELLOW"
          issuer = "$ISSUER"
          name = "PiRC-207 Yellow Layer"
          desc = "Layer 2 of the official PiRC-207 7-Layer RWA System"
          image = "https://ze0ro99.github.io/PiRC/images/yellow.png"

          [[CURRENCIES]]
          code = "ORANGE"
          issuer = "$ISSUER"
          name = "PiRC-207 Orange Layer"
          desc = "Layer 3 of the official PiRC-207 7-Layer RWA System"
          image = "https://ze0ro99.github.io/PiRC/images/orange.png"

          [[CURRENCIES]]
          code = "BLUE"
          issuer = "$ISSUER"
          name = "PiRC-207 Blue Layer"
          desc = "Layer 4 of the official PiRC-207 7-Layer RWA System"
          image = "https://ze0ro99.github.io/PiRC/images/blue.png"

          [[CURRENCIES]]
          code = "GREEN"
          issuer = "$ISSUER"
          name = "PiRC-207 Green Layer"
          desc = "Layer 5 of the official PiRC-207 7-Layer RWA System"
          image = "https://ze0ro99.github.io/PiRC/images/green.png"

          [[CURRENCIES]]
          code = "RED"
          issuer = "$ISSUER"
          name = "PiRC-207 Red Layer"
          desc = "Layer 6 of the official PiRC-207 7-Layer RWA System"
          image = "https://ze0ro99.github.io/PiRC/images/red.png"
          EOF

          # 4. Commit Changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Fix: Clean pi.toml structure" || echo "No changes"
          git push

      - name: Set Home Domain
        env:
          STELLAR_SECRET: ${{ secrets.STELLAR_TESTNET_SECRET }}
        run: |
          node - << 'EOF'
          const StellarSDK = require("@stellar/stellar-sdk");
          const server = new StellarSDK.Horizon.Server("https://api.testnet.minepi.com");
          const kp = StellarSDK.Keypair.fromSecret(process.env.STELLAR_SECRET);
          async function run() {
            const acc = await server.loadAccount(kp.publicKey());
            const tx = new StellarSDK.TransactionBuilder(acc, {
              fee: (await server.fetchBaseFee()).toString(),
              networkPassphrase: "Pi Testnet",
              timebounds: await server.fetchTimebounds(100)
            }).addOperation(StellarSDK.Operation.setOptions({ homeDomain: "ze0ro99.github.io/PiRC" })).build();
            tx.sign(kp);
            await server.submitTransaction(tx);
          }
          run().catch(console.error);
          EOF
