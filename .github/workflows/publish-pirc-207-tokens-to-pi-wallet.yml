name: Publish PiRC-207 Tokens to Pi Wallet + Test Pidex (Full Automation)

on:
  workflow_dispatch:

jobs:
  publish-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (supports any branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}   # works on main or any branch

      - name: Install Node.js + Stellar SDK
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @stellar/stellar-sdk

      - name: Full Repo & GitHub Pages Verification
        run: |
          echo "🔍 Repository parameters check..."
          echo "Branch: $(git branch --show-current)"
          echo "Files in root:" && ls -la
          echo "Images folder:" && ls -la images/ 2>/dev/null || echo "No images folder yet"
          echo "GitHub Pages status:"
          curl -I -s https://ze0ro99.github.io/PiRC/.well-known/pi.toml | head -n 10

      - name: Verify pi.toml + All 7 Images
        run: |
          echo "✅ Verifying pi.toml..."
          curl -s https://ze0ro99.github.io/PiRC/.well-known/pi.toml | head -n 30
          echo ""
          echo "✅ Verifying all 7 token images..."
          for color in purple gold yellow orange blue green red; do
            if curl -I -s -f https://ze0ro99.github.io/PiRC/images/$color.png > /dev/null; then
              echo "✅ $color.png OK"
            else
              echo "❌ $color.png MISSING - please upload it!"
            fi
          done

      - name: Derive Issuer Public Key from Secret
        env:
          STELLAR_SECRET: ${{ secrets.STELLAR_TESTNET_SECRET }}
        run: |
          node -e '
            const { Keypair } = require("@stellar/stellar-sdk");
            const kp = Keypair.fromSecret(process.env.STELLAR_SECRET);
            console.log("✅ ISSUER PUBLIC KEY:", kp.publicKey());
            console.log("Copy this into .well-known/pi.toml for all tokens");
          '

      - name: Automatically Set Home Domain (using your secret)
        env:
          STELLAR_SECRET: ${{ secrets.STELLAR_TESTNET_SECRET }}
        run: |
          node - << 'EOF'
            const StellarSDK = require("@stellar/stellar-sdk");
            const server = new StellarSDK.Horizon.Server("https://api.testnet.minepi.com");
            const NETWORK_PASSPHRASE = "Pi Testnet";
            const issuerKeypair = StellarSDK.Keypair.fromSecret(process.env.STELLAR_SECRET);

            async function setHomeDomain() {
              const account = await server.loadAccount(issuerKeypair.publicKey());
              const feeResponse = await server.ledgers().order("desc").limit(1).call();
              const baseFee = feeResponse.records[0].base_fee_in_stroops;

              const tx = new StellarSDK.TransactionBuilder(account, {
                fee: baseFee,
                networkPassphrase: NETWORK_PASSPHRASE,
                timebounds: await server.fetchTimebounds(90),
              })
                .addOperation(StellarSDK.Operation.setOptions({ homeDomain: "ze0ro99.github.io/PiRC" }))
                .build();

              tx.sign(issuerKeypair);
              const result = await server.submitTransaction(tx);
              console.log("✅ Home Domain set successfully!");
              console.log("Transaction:", result.hash);
            }

            setHomeDomain().catch(console.error);
          EOF

      - name: Final Pi Wallet Discovery Links
        run: |
          echo "🎉 Tokens will appear in Pi Wallet within 5-15 minutes"
          echo "Test these links after Home Domain is set:"
          for code in PURPLE GOLD YELLOW ORANGE BLUE GREEN RED; do
            echo "$code → https://api.testnet.minepi.com/assets?asset_code=$code&asset_issuer=YOUR_ISSUER_PUBLIC_KEY"
          done
          echo ""
          echo "PiDex transactions will appear automatically in Stellar Explorer."
