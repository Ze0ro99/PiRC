name: Professional PiRC RWA + PiRC-101 Refactor - 18 Atomic PR Factory
on:
  workflow_dispatch: 

jobs:
  professional-rwa-pi-rc-101-pr-factory:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync fork main with upstream PiNetwork/PiRC
        run: |
          git remote add upstream https://github.com/PiNetwork/PiRC.git || true
          git fetch upstream --prune
          git checkout main
          git reset --hard upstream/main
          git push origin main --force
          echo "✅ Fork main is now a clean mirror of upstream/main"

      - name: Fetch and Link Source-of-Truth Branch
        run: |
          # Fetch the experimental branch and create a local tracking branch named 'source-truth'
          git fetch origin rwa-conceptual-auth-extension:source-truth
          echo "✅ source-truth local branch created from experimental extension"

      - name: Configure Git
        run: |
          git config --global user.name "Ze0ro99"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # --- PR 1: RWA Core Schema ---
      - name: PR 1 - RWA Core Specification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout main
          git checkout -b rwa/core-schema-v0.3
          # Use 'source-truth' as the reference
          git checkout source-truth -- spec/
          
          # Professional formatting check
          if [ -f "spec/rwa_auth_schema_v0.3.json" ]; then
            jq . spec/rwa_auth_schema_v0.3.json > temp.json && mv temp.json spec/rwa_auth_schema_v0.3.json
          fi
          
          git add spec/
          git commit -m "spec: migrate canonical RWA Authentication Schema v0.3"
          git push origin rwa/core-schema-v0.3 --force
          
          gh pr create --repo PiNetwork/PiRC \
            --title "spec: RWA Authentication Schema v0.3" \
            --body "## RWA Foundation PR 1/18
            This PR establishes the canonical JSON schema for RWA authentication. 
            - **Source**: Migrated from rwa-conceptual-auth-extension
            - **Ref**: PiRC RWA Standardization" \
            --base main --head Ze0ro99:rwa/core-schema-v0.3
          sleep 5 # Avoid rate limits

      # --- PR 2: RWA Examples ---
      - name: PR 2 - RWA Reference Examples
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout main
          git checkout -b rwa/examples-v0.3
          git checkout source-truth -- examples/
          git add examples/
          git commit -m "docs: migrate eyewear_canonical_example and verification_demo"
          git push origin rwa/examples-v0.3 --force
          gh pr create --repo PiNetwork/PiRC \
            --title "docs: RWA Canonical Examples (Eyewear Pilot)" \
            --body "Atomic PR #2/18: Provides golden-reference examples for the RWA v0.3 schema." \
            --base main --head Ze0ro99:rwa/examples-v0.3
          sleep 5

      # --- PR 3: PiRC-101 Sovereign Monetary Standard ---
      - name: PR 3 - PiRC-101 Sovereign Monetary Standard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout main
          git checkout -b pirc/pirc-101-monetary
          git checkout source-truth -- PiRC-101/
          git add PiRC-101/
          git commit -m "pirc: migrate full PiRC-101 Sovereign Monetary Standard Framework"
          git push origin pirc/pirc-101-monetary --force
          gh pr create --repo PiNetwork/PiRC \
            --title "pirc: PiRC-101 Sovereign Monetary Standard Framework" \
            --body "Atomic PR #3/18: Complete migration of the PiRC-101 framework including simulators and developer guides." \
            --base main --head Ze0ro99:pirc/pirc-101-monetary
          sleep 5

      # NOTE: Repeat this clean logic for PRs 4-18. 
      # Key fix applied: Use 'source-truth' instead of the remote name in checkout commands.

      # --- EXAMPLE OF FIX FOR PR 17 (Wildcards) ---
      - name: PR 17 - Reward Engine & Treasury
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout main
          git checkout -b core/reward-treasury
          # Use quotes for wildcards to prevent shell expansion errors
          git checkout source-truth -- "*reward*.rs" "treasury_vault.rs" "bootstrap.rs" || true
          git add .
          git commit -m "core: migrate Reward Engine and Treasury Vault logic"
          git push origin core/reward-treasury --force
          gh pr create --repo PiNetwork/PiRC \
            --title "core: Reward Engine & Treasury Vault" \
            --body "Atomic PR #17/18: Core Rust logic for rewards and vault management." \
            --base main --head Ze0ro99:core/reward-treasury
