name: "CodeQL"

on:
  push:
    branches: [ "main", "v2.1" ]
  pull_request:
    branches: [ "main", "v2.1" ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'python', 'rust' ]
        # TypeScript is analyzed via the 'javascript' extractor in CodeQL

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Exclude generated/minified files from causing syntax errors
        config: |
          paths-ignore:
            - 'node_modules/**'
            - 'dist/**'
            - 'build/**'
            - '.next/**'

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
