name: Ultimate Justice Orchestrator (PiRC1-PiRC260)

on:
  push:
    branches: ["**"] # Monitors every single branch automatically
  pull_request:
    branches: ["**"]

permissions:
  security-events: write
  contents: write
  actions: read

jobs:
  AI_Audit_and_Logic_Repair:
    runs-on: ubuntu-latest
    steps:
      - name: Comprehensive Repo Scan
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 1: Initialize CodeQL (This was the missing link)
      - name: Initialize CodeQL AI Engine
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript-typescript, rust
          build-mode: none # Ensures Rust and Scripts are scanned without compilation errors

      # Step 2: Custom PiRC Compliance Check
      - name: AI Compliance (PiRC1 to PiRC-260)
        run: |
          # Enforcing high-precision math (10^-7) across all branches
          python scripts/justice_math_validator.py --deep-scan --standards 1-260

      # Step 3: Perform Security Analysis
      - name: Security Patching & AI Audit
        uses: github/codeql-action/analyze@v3
        with:
          category: "/logic-and-security"

  Blockchain_Testnet_Validation:
    needs: AI_Audit_and_Logic_Repair
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Stellar & Pi Network SDK Auth
        run: |
          # Authenticating with Real Testnet environments
          npm install @pinetwork-js/sdk stellar-sdk
          node scripts/testnet_validator.js --env Testnet1 --env Testnet2

      - name: Smart Contract Deployment (Validation)
        run: |
          # Deploying Justice Engine contracts to Pi Testnet
          python scripts/contract_generator.py --deploy --network pi_testnet

  Frontend_Backend_Build:
    needs: Blockchain_Testnet_Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Automatic HTML/UI Assembly
        run: |
          npm install
          npm run build # Prepares the app for Vercel

      - name: Vercel Production Deployment
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          working-directory: ./dist
