| Gold    | CD3UAUN4FU3VHPMLOZWFQWJ2UBUUBBD37SZ7WBEGJQACJ7YF6QVE2SYG | https://stellar.expert/explorer/testnet/tx/1b3e65d28102febf458b49ec1ed095fee41c2ad0e38254dcda5464f0820cac88 |
| Yellow  | CANLSQUPUZYKE3S2HAIGXAHMOQWE4FVX5DS7GTL42BVKSNHLFVMQSDFF | https://stellar.expert/explorer/testnet/tx/75411b63eb7257496a9e19c4b89412eef3fc8b00f45f8b7942ba58fbe294845e |
| Orange  | CB7T6TDSZ5B2MQI7NI4EG6ZASYPRMJ3XVUWS6BON4Z64OBMUJ4ZD6GKF | https://stellar.expert/explorer/testnet/tx/3363bce259f2e0acc5bad02408d89da2187dd5e4a485d6ecad397e5b014e7691 |
| Blue    | CAMSQZTSCTF3MG4UEIAWKRZNSX7LLKGKXMVBEQO2ETVPGS3CINM7JBQD | https://stellar.expert/explorer/testnet/tx/8a5daf879a604e64088d5730f686250deffebe4d4514e1bd53f9a4792d748430 |
| Green   | CBPG33E7RUX6MGU65IMM4HXCAGLA4OZRBOUWKQSBTIZWE2RD52VGWDT4 | https://stellar.expert/explorer/testnet/tx/5e9c0b7fd03bb8c07395ce930997e09957c51e94b9a8015b06e22868ceff1142 |
| Red     | CC6WMAHKOPWY6HW46VNKTAV4DZZLRTTNMYLDEKCAICQGMCWV5PZYNTBO | https://stellar.expert/explorer/testnet/tx/f4b5e37209876dc04c7b8b5041973d2a89916f24b8a61dc3732f0f81cfe27bb4 |

