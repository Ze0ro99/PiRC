          # Generate verification script
          cat > scripts/verify-pirc-207-all-layers.sh << 'EOF'
#!/bin/bash
# PiRC-207 Full Verification Script
REGISTRY_ID="$1"  # Pass Registry ID as argument

echo "🔍 Verifying PiRC-207 Registry + 7 Layers..."
for i in {0..6}; do
  echo "=== Layer $i ==="
  stellar contract invoke --id "$REGISTRY_ID" --network testnet -- get_layer_metadata --layer_id "$i"
done
echo "✅ All layers verified!"
EOF

          chmod +x scripts/verify-pirc-207-all-layers.sh

          echo "🎉 ALL FILES GENERATED!"
          echo "Registry Contract ID: $REGISTRY_ID"
          echo "Full report: docs/PiRC-207-Final-Deployment-Report.md"
          echo "Verification script: scripts/verify-pirc-207-all-layers.sh"
