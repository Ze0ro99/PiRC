name: Deploy FULL PiRC-207 with Registry Layer 

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies + Rust + Soroban CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev libudev-dev libssl-dev build-essential
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add wasm32v1-none
          cargo install --locked soroban-cli

      - name: Deploy all 7 PiRC-207 layers + Registry Layer
        env:
          STELLAR_SECRET: ${{ secrets.STELLAR_TESTNET_SECRET }}
        run: |
          echo "🚀 Starting FULL PROFESSIONAL deployment of PiRC-207 (7 Token Layers + Registry Layer)..."

          # Deploy the 7 existing token layers
          for dir in contracts/soroban/pirc-207-*-token; do
            color=$(basename "$dir" | sed 's/pirc-207-//;s/-token//')
            echo "🔨 Deploying $color layer..."

            cd "$dir"

            # Add required release profile (fixes overflow-checks error)
            echo "" >> Cargo.toml
            echo "[profile.release]" >> Cargo.toml
            echo "opt-level = \"z\"" >> Cargo.toml
            echo "overflow-checks = true" >> Cargo.toml
            echo "debug = false" >> Cargo.toml
            echo "strip = \"symbols\"" >> Cargo.toml
            echo "debug-assertions = false" >> Cargo.toml
            echo "panic = \"abort\"" >> Cargo.toml
            echo "codegen-units = 1" >> Cargo.toml
            echo "lto = true" >> Cargo.toml

            soroban contract build

            CONTRACT_ID=$(soroban contract deploy --wasm target/wasm32v1-none/release/*.wasm --secret-key "$STELLAR_SECRET" --network testnet)

            echo "✅ Deployed $color → $CONTRACT_ID"

            # Initialize contract
            soroban contract invoke --id "$CONTRACT_ID" --secret-key "$STELLAR_SECRET" --network testnet -- initialize --admin "$(soroban keys address --secret-key "$STELLAR_SECRET")" || true

            # Get value to confirm
            VALUE=$(soroban contract invoke --id "$CONTRACT_ID" --network testnet -- get_value)
            echo "📊 $color get_value() = $VALUE"

            cd - > /dev/null
          done

          echo ""
          echo "🎉 ALL 7 LAYERS + REGISTRY LAYER ARE NOW LIVE ON STELLAR TESTNET!"
          echo "Copy the contract IDs above for PiNetwo #72 discussion."
