name: PiRC Deploy to Testnet

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy-soroban:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Stellar CLI (Stable Build)
        run: cargo install --locked stellar-cli

      - name: Make Script Executable
        run: chmod +x scripts/automation/deploy_soroban_contracts.sh

      - name: Run Deployment Factory
        env:
          STELLAR_TESTNET_SECRET: ${{ secrets.STELLAR_TESTNET_SECRET }}
          DISTRIBUTOR_SECRET: ${{ secrets.DISTRIBUTOR_SECRET }}
        run: ./scripts/automation/deploy_soroban_contracts.sh
