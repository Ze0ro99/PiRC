[build]
  # Directory containing your index.html and static assets
  publish = "."
  
  # Directory where your Netlify Functions (Backend logic) are located
  functions = "netlify/functions"

[build.environment]
  # Specifying Node.js version for stability
  NODE_VERSION = "18"

# Backend Function configuration for performance
[functions]
  # Uses esbuild for faster cold starts and bundling
  node_bundler = "esbuild"
  # Ensures required modules for OKX/MEXC data fetching are included
  external_node_modules = ["axios"]

# API Redirects for cleaner Frontend-to-Backend communication
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Security Headers and CORS Policy
[[headers]]
  for = "/*"
  [headers.values]
    # Allows controlled access for data synchronization
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    
    # Security hardening against common web vulnerabilities
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Cache management for real-time telemetry accuracy
    Cache-Control = "public, max-age=0, must-revalidate"

